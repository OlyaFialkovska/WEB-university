<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MindVault — Робоча сторінка</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="bg-dark text-light d-flex flex-column min-vh-100">
    <div id="app" class="d-flex flex-column min-vh-100">
      <header class="border-bottom border-secondary">
        <nav class="navbar navbar-expand-lg navbar-dark">
          <div class="container py-2">
            <a href="index.html" class="navbar-brand fw-semibold d-flex align-items-center gap-2">
              <span class="d-flex align-items-center justify-content-center rounded bg-primary text-white" style="width: 36px; height: 36px">MV</span>
              <span>MindVault</span>
            </a>
            <button class="navbar-toggler border-secondary" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
              <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
              <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2 mt-3 mt-lg-0">
                <li class="nav-item"><a class="nav-link" href="about.html">Про додаток</a></li>
                <li class="nav-item"><a class="nav-link active" href="work.html">Робоча</a></li>
                <li class="nav-item"><a class="nav-link" href="profile.html">Профіль</a></li>
                <li class="nav-item"><a class="nav-link" href="login.html">Вхід</a></li>
                <li class="nav-item"><a class="btn btn-primary btn-sm ms-lg-2 mt-2 mt-lg-0" href="register.html">Реєстрація</a></li>
              </ul>
            </div>
          </div>
        </nav>
      </header>

      <main class="container my-5">
        <div v-if="message" class="alert alert-warning">{{ message }}</div>

        <template v-if="userId">
          <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
            <div>
              <h1 class="fw-semibold mb-1">Робоча сторінка</h1>
              <p class="text-secondary mb-0">{{ lastAction }}</p>
            </div>
            <div class="d-flex gap-3 flex-wrap">
              <div class="card stat-card text-center">
                <div class="stat-label">Усього записів</div>
                <div class="stat-number stat-number--primary">{{ stats.total }}</div>
              </div>
              <div class="card stat-card text-center">
                <div class="stat-label">Цілей</div>
                <div class="stat-number stat-number--success">{{ stats.goals }}</div>
              </div>
            </div>
          </div>

          <div class="card panel-soft border border-secondary mb-4">
            <div class="card-body">
              <h5 class="card-title mb-3">{{ editingId ? 'Редагувати запис' : 'Додати новий запис' }}</h5>
              <form @submit.prevent="saveNote">
                <div class="row g-3">
                  <div class="col-12 col-md-6">
                    <label class="form-label">Назва</label>
                    <input v-model="form.title" type="text" class="form-control" placeholder="Наприклад, План на тиждень" required />
                  </div>
                  <div class="col-12 col-md-6">
                    <label class="form-label">Категорія</label>
                    <select v-model="form.category" class="form-select" required>
                      <option>Ідея</option>
                      <option>Ціль</option>
                      <option>План</option>
                      <option>Мотивація</option>
                    </select>
                  </div>
                  <div class="col-12">
                    <label class="form-label">Опис</label>
                    <textarea v-model="form.description" class="form-control" rows="3" placeholder="Коротко опиши свій запис" required></textarea>
                  </div>
                  <div class="col-12 d-flex flex-wrap gap-2">
                    <button type="submit" class="btn btn-primary">{{ editingId ? 'Зберегти' : 'Додати' }}</button>
                    <button type="button" @click="resetForm" class="btn btn-outline-light">Очистити</button>
                    <button v-if="editingId" type="button" @click="resetForm" class="btn btn-outline-warning">Скасувати редагування</button>
                  </div>
                </div>
              </form>
            </div>
          </div>

          <div class="card panel-soft border border-secondary mb-4">
            <div class="card-body">
              <div class="row g-3 align-items-end">
                <div class="col-12 col-md-8">
                  <label class="form-label">Пошук</label>
                  <input v-model="filters.search" @input="loadNotes" type="text" class="form-control" placeholder="Шукати за назвою або описом" />
                </div>
                <div class="col-12 col-md-4">
                  <label class="form-label">Фільтр за категорією</label>
                  <select v-model="filters.category" @change="loadNotes" class="form-select">
                    <option>Усі</option>
                    <option>Ідея</option>
                    <option>Ціль</option>
                    <option>План</option>
                    <option>Мотивація</option>
                  </select>
                </div>
              </div>
            </div>
          </div>

          <div v-if="!notes.length" class="empty-state mb-4">Записів за вибраними фільтрами поки немає.</div>

          <div class="row g-4">
            <div v-for="note in notes" :key="note.id" class="col-12 col-md-6 col-lg-4">
              <div class="card note-card bg-dark border-secondary h-100">
                <div class="card-body d-flex flex-column">
                  <div class="d-flex justify-content-between align-items-start gap-2 mb-2">
                    <span :class="['badge', badgeClass(note.category)]">{{ note.category }}</span>
                    <small class="text-secondary">{{ formatDate(note.createdAt) }}</small>
                  </div>
                  <h5 class="card-title">{{ note.title }}</h5>
                  <p class="card-text text-secondary flex-grow-1">{{ note.description }}</p>
                  <div class="d-flex gap-2 flex-wrap mt-3">
                    <button @click="startEdit(note)" class="btn btn-sm btn-outline-light">Редагувати</button>
                    <button @click="deleteNote(note.id)" class="btn btn-sm btn-outline-danger">Видалити</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </template>
      </main>

      <footer class="mt-auto border-top border-secondary">
        <div class="container text-center py-3 text-secondary small">© 2026 MindVault</div>
      </footer>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script type="module" src="js/work-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
